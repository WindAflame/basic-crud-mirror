<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BookStore</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    form { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
    input { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; }
    .btn-submit { background: #4caf50; color: #fff; }
    .btn-cancel { background: #9e9e9e; color: #fff; }
    .btn-edit   { background: #2196f3; color: #fff; margin-right: 4px; }
    .btn-delete { background: #f44336; color: #fff; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
    th { background: #f9f9f9; }
  </style>
</head>
<body>

<h1>BookStore</h1>

<!-- Create / Edit form -->
<form id="form">
  <input id="title"    placeholder="Title"    required>
  <input id="author"   placeholder="Author"   required>
  <input id="category" placeholder="Category" required>
  <button type="submit" class="btn-submit" id="submit-btn">Add</button>
  <button type="button" class="btn-cancel" id="cancel-btn" hidden>Cancel</button>
</form>

<table>
  <thead>
    <tr><th>Title</th><th>Author</th><th>Category</th><th>Actions</th></tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script type="module" src="./main.js"></script>

</body>
</html>
